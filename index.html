function PercorsoCard({ p, isDark, delay }) {
  const [hovered, setHovered] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          setTimeout(() => el.style.opacity = '1', delay);
          setTimeout(() => el.style.transform = 'none', delay);
          obs.unobserve(el);
        }
      });
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);

  return (
    <div ref={ref} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        padding: '48px 40px',
        background: hovered ? p.color : (isDark ? 'oklch(17% 0.05 155)' : 'oklch(21% 0.06 155)'),
        transition: 'background 0.4s ease, transform 0.3s ease',
        transform: hovered ? 'translateY(-4px)' : 'none',
        cursor: 'default',
        opacity: 0,
      }}
    >
      <div style={{
        fontSize: 13, fontWeight: 500, letterSpacing: '0.14em',
        color: hovered ? 'rgba(255,255,255,0.6)' : p.color,
        marginBottom: 28, transition: 'color 0.4s',
      }}>{p.num}</div>
      <h3 style={{
        fontFamily: 'Cormorant Garamond, serif',
        fontSize: 30, fontWeight: 300,
        color: 'oklch(94% 0.005 80)',
        marginBottom: 16, lineHeight: 1.2,
      }}>{p.title}</h3>
      <p style={{
        fontSize: 14, fontWeight: 500,
        color: hovered ? 'rgba(255,255,255,0.9)' : 'oklch(78% 0.005 80)',
        marginBottom: 16, lineHeight: 1.5, transition: 'color 0.4s',
      }}>{p.tagline}</p>
      <p style={{
        fontSize: 14, lineHeight: 1.75, fontWeight: 300,
        color: hovered ? 'rgba(255,255,255,0.75)' : 'oklch(58% 0.01 80)',
        transition: 'color 0.4s',
      }}>{p.body}</p>
    </div>
  );
}

function InstagramEmbed({ url }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.instgrm) {
      window.instgrm.Embeds.process();
    } else {
      const s = document.createElement('script');
      s.src = 'https://www.instagram.com/embed.js';
      s.async = true;
      s.onload = () => { if (window.instgrm) window.instgrm.Embeds.process(); };
      document.body.appendChild(s);
    }
  }, []);
  return (
    <div ref={ref} style={{ maxWidth: 540, width: '100%' }}>
      <blockquote
        className="instagram-media"
        data-instgrm-permalink={url}
        data-instgrm-version="14"
        style={{
          background: '#FFF', border: 0, borderRadius: 3, boxShadow: '0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15)',
          margin: '1px', maxWidth: 540, minWidth: 326, padding: 0, width: '99.375%',
        }}
      />
    </div>
  );
}

        )}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0 }}>
          <button onClick={accept} style={{ padding: '8px 18px', background: accent, color: '#fff', border: 'none', borderRadius: 4, fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'DM Sans' }}>Accetta</button>
          {!showDetails && <button onClick={() => setShowDetails(true)} style={{ padding: '8px 18px', background: 'transparent', border: `1px solid ${isDark ? 'oklch(40% 0.02 155)' : 'oklch(80% 0.01 80)'}`, color: textMuted, borderRadius: 4, fontSize: 13, cursor: 'pointer', fontFamily: 'DM Sans' }}>Personalizza</button>}
          <button onClick={reject} style={{ padding: '8px 12px', background: 'transparent', border: 'none', color: textMuted, fontSize: 13, cursor: 'pointer', fontFamily: 'DM Sans', textDecoration: 'underline' }}>Rifiuta</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
