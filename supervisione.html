<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "oklch(52% 0.14 145)",
  "accentWarm": "oklch(62% 0.12 50)",
  "heroBold": false,
  "darkMode": false,
  "showPhoto": true
}/*EDITMODE-END*/;

const { useState, useEffect, useRef } = React;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const isDark = tweaks.darkMode;
  const bg = isDark ? 'oklch(14% 0.01 80)' : 'oklch(97.5% 0.008 80)';
  const bgAlt = isDark ? 'oklch(18% 0.012 80)' : 'oklch(94% 0.012 80)';
  const bgDark = isDark ? 'oklch(15% 0.04 155)' : 'oklch(26% 0.06 155)';
  const text = isDark ? 'oklch(93% 0.005 80)' : 'oklch(20% 0.02 80)';
  const textMuted = isDark ? 'oklch(65% 0.01 80)' : 'oklch(50% 0.015 80)';
  const accent = tweaks.accentColor;

  useEffect(() => {
    document.documentElement.style.setProperty('--bg', bg);
    document.documentElement.style.setProperty('--text', text);
    document.documentElement.style.setProperty('--accent', accent);
  }, [bg, text, accent]);

  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  const [width, setWidth] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const handler = () => setWidth(window.innerWidth);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  const isMobile = width < 768;
  const [menuOpen, setMenuOpen] = useState(false);

  const WA_LINK = "https://api.whatsapp.com/send/?phone=393314980002&text&type=phone_number&app_absent=0";

  const s = {
    nav: {
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '0 5%', height: 72,
      background: isDark ? 'oklch(14% 0.01 80 / 0.95)' : 'oklch(97.5% 0.008 80 / 0.95)',
      backdropFilter: 'blur(12px)',
      borderBottom: `1px solid ${isDark ? 'oklch(30% 0.01 80)' : 'oklch(88% 0.012 80)'}`,
    },
    logoText: {
      fontFamily: 'Cormorant Garamond, serif', fontSize: 20, fontWeight: 500,
      color: text, letterSpacing: '0.02em', lineHeight: 1.2,
    },
    logoSub: { fontSize: 12, fontWeight: 300, color: textMuted, display: 'block', letterSpacing: '0.06em' },
    navLinks: { display: 'flex', gap: 36, alignItems: 'center', listStyle: 'none' },
    navLink: { fontFamily: 'DM Sans', fontSize: 14, color: text, textDecoration: 'none', letterSpacing: '0.04em', cursor: 'pointer', transition: 'color 0.2s' },
    ctaBtn: {
      padding: '10px 24px', background: accent, color: '#fff',
      border: 'none', borderRadius: 4, fontSize: 14, fontWeight: 500,
      cursor: 'pointer', letterSpacing: '0.03em', transition: 'opacity 0.2s, transform 0.15s',
      fontFamily: 'DM Sans', textDecoration: 'none', display: 'inline-block',
    },
    section: { padding: '100px 5%' },
    sectionInner: { maxWidth: 1200, margin: '0 auto' },
    sectionTag: { fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: accent, fontWeight: 500, marginBottom: 16 },
    sectionTitle: {
      fontFamily: 'Cormorant Garamond, serif',
      fontSize: 'clamp(34px, 4vw, 54px)',
      fontWeight: 300,
      color: text,
      marginBottom: 48,
      lineHeight: 1.15,
    },
  };

  const steps = [
    {
      num: '01',
      title: 'Contatto via WhatsApp',
      body: 'I due professionisti mi scrivono su WhatsApp indicando i propri ambiti di lavoro. Da quel momento si parte: fissiamo una call conoscitiva gratuita di 30 minuti per capire su quali temi hanno bisogno di lavorare.',
    },
    {
      num: '02',
      title: 'Call conoscitiva (30 min)',
      body: 'È l\'unico incontro preliminare. Parliamo dei temi professionali su cui la coppia vuole lavorare, del contesto in cui operano e di ciò che vogliono portare in supervisione. Sulla base di questa conversazione seleziono le casistiche.',
    },
    {
      num: '03',
      title: 'Schede preparatorie',
      body: 'Prima della sessione ricevete offline le schede preparatorie con i casi selezionati: materiali per entrare nel contesto e arrivare all\'incontro già immersi nel tema. Non c\'è nessuna ulteriore call preparatoria.',
    },
    {
      num: '04',
      title: 'Sessione a tre',
      body: 'La sessione dura 90 minuti in videocall online, in orario serale. I due professionisti si alternano nell\'incarnare i clienti di esempio selezionati dal supervisore: a turno si entra nel ruolo, si esplora la dinamica, ci si confronta. Il supervisore tiene il contenitore e fa emergere i temi trasversali.',
    },
  ];

  const materials = [
    { icon: '📋', title: 'Schede pre-sessione', body: 'Prima di ogni incontro ricevete offline i materiali preparatori con le casistiche selezionate. Servono a entrare nel contesto e ad arrivare alla sessione già immersi nel lavoro, senza bisogno di una call aggiuntiva.' },
    { icon: '📄', title: 'Sintesi post-sessione', body: 'Documento di follow-up con i principali insight emersi, le piste di riflessione e le traiettorie di lavoro individuate nella sessione.' },
    { icon: '🔍', title: 'Domande guida', body: 'Una lista di domande riflessive da usare in autonomia dopo la supervisione, per continuare ad approfondire la propria pratica relazionale.' },
    { icon: '🗂', title: 'Risorse bibliografiche', body: 'Indicazioni di letture, articoli e risorse formative legate ai temi e ai modelli emersi nel lavoro condiviso.' },
  ];

  const faqs = [
    { q: 'Cosa distingue questa supervisione da un gruppo di supervisione?', a: 'Nei gruppi di supervisione di solito è il professionista a portare il caso che vuole. Qui il principio metodologico è diverso: le casistiche sono selezionate dal supervisore in base al profilo e alle esigenze dei partecipanti. Non si parte da ciò che si è già pronti a vedere — si lavora su scenari costruiti per far emergere i temi trasversali più rilevanti per quella coppia di professionisti.' },
    { q: 'Perché le casistiche le sceglie il supervisore?', a: 'La forza di questo format sta esattamente qui: i partecipanti non devono scegliere cosa portare. Ricevono scenari reali e rappresentativi, li esplorano senza il filtro del proprio punto di vista difensivo, e questo permette di rilevare pattern e dinamiche che spesso non emergono quando si porta solo ciò che si è già elaborato.' },
    { q: 'Perché solo in coppia?', a: 'La supervisione tra pari è uno spazio a tre: io come supervisore e due colleghi che si osservano e si rispecchiano a vicenda. Questo formato genera dinamiche di apprendimento che la supervisione individuale non produce — confronto, risonanza, senso di non essere soli nel proprio lavoro. Una coppia è la dimensione minima per attivare questo processo.' },
    { q: 'Posso partecipare con un collega che conosco appena?', a: 'Sì, non è necessario avere già un rapporto consolidato. L\'importante è che entrambi portiate un\'intenzione genuina di crescita professionale. Spesso colleghi che si conoscono poco sviluppano una prospettiva più fresca e meno contaminata da dinamiche già consolidate.' },
    { q: 'Il pacchetto da 5 sessioni può essere usato con colleghi diversi?', a: 'No, il pacchetto è pensato per una coppia stabile. La continuità è parte del valore: permette di seguire l\'evoluzione dei temi e costruire una relazione di fiducia reciproca nel tempo.' },
    { q: 'Le sessioni sono valide ai fini ECM o crediti formativi?', a: 'Al momento non eroghiamo crediti ECM. Le sessioni sono però documentate e verbalizzate, e possono essere inserite nel proprio portfolio formativo come attività di supervisione continua.' },
  ];

  const credentials = [
    { label: 'Psicologo', detail: 'Laurea in Psicologia e abilitazione professionale con lunga formazione nel lavoro sulla relazione e sui processi psicologici in contesto lavorativo e personale.' },
    { label: 'Coach certificato', detail: 'Formazione specifica nel coaching professionale con esperienza diretta nel supporto a leader, manager e professionisti in percorsi di sviluppo e cambiamento.' },
    { label: '18 anni in realtà multinazionali', detail: 'Esperienza maturata dentro grandi organizzazioni internazionali: coaching continuo delle risorse, assessment, sviluppo del potenziale, selezione e gestione delle persone.' },
    { label: 'Supervisore praticante', detail: 'Esperienza pluriennale come supervisore di coach e counselor, con attenzione ai processi relazionali, alle dinamiche di transfert e all\'identità professionale del professionista.' },
  ];

  return (
    <div style={{ background: bg, minHeight: '100vh' }}>

          display: 'none', flexDirection: 'column', gap: 5, background: 'none', border: 'none', cursor: 'pointer', padding: 8,

          <span style={{ display: 'block', width: 24, height: 2, background: text, opacity: menuOpen ? 0 : 1, transition: 'opacity 0.2s' }}/>
          <span style={{ display: 'block', width: 24, height: 2, background: text, transition: 'transform 0.2s', transform: menuOpen ? 'rotate(-45deg) translate(5px,-5px)' : 'none' }}/>
        </button>
        <ul className={`nav-links${menuOpen ? ' open' : ''}`} style={s.navLinks}>
          {[['Chi Sono','index.html#chi-sono'],['Percorsi','index.html#percorsi'],['Supervisione','#top']].map(([l, href]) => (
            <li key={l}>
              <a href={href} style={s.navLink}
                onClick={() => setMenuOpen(false)}
                onMouseEnter={e => e.target.style.color = accent}
                onMouseLeave={e => e.target.style.color = text}
              >{l}</a>
            </li>
          ))}
          <li>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={s.ctaBtn}
              onMouseEnter={e => { e.target.style.opacity = '0.85'; e.target.style.transform = 'translateY(-1px)'; }}
              onMouseLeave={e => { e.target.style.opacity = '1'; e.target.style.transform = 'none'; }}
            >Scrivimi su WhatsApp</a>
          </li>
        </ul>
      </nav>

      {/* HERO */}
      <section id="top" style={{
        minHeight: '80vh', display: 'flex', alignItems: 'center',
        padding: '140px 5% 100px', position: 'relative', overflow: 'hidden',

          position: 'absolute', inset: 0,
          backgroundImage: 'url(color-splash.png)',

        <div style={{

        <div className="reveal" style={{ maxWidth: 820, margin: '0 auto', textAlign: 'center', position: 'relative', zIndex: 2, width: '100%' }}>
          <p style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'oklch(70% 0.12 145)', fontWeight: 500, marginBottom: 24 }}>
            Per coach, counselor e psicologi
          </p>
          <h1 style={{
            fontFamily: 'Cormorant Garamond, serif',
            fontSize: 'clamp(42px, 5.5vw, 76px)',
            fontWeight: 300, lineHeight: 1.1,
            color: 'oklch(95% 0.005 80)',
            marginBottom: 28, textWrap: 'pretty',
          }}>
            Supervisione
          </h1>
          <p style={{
            fontSize: 18, lineHeight: 1.75, fontWeight: 300,
            color: 'oklch(78% 0.01 80)', maxWidth: 620, margin: '0 auto 32px',
          }}>
            Uno spazio strutturato dove due professionisti lavorano su casistiche selezionate dal supervisore,
            con schede preparatorie e guida esperta.
          </p>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, padding: '10px 20px', borderRadius: 4, background: 'oklch(100% 0 0 / 0.06)', border: '1px solid oklch(100% 0 0 / 0.12)', marginBottom: 40 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: accent, display: 'inline-block', flexShrink: 0 }}/>
            <span style={{ fontSize: 13, color: 'oklch(80% 0.01 80)', letterSpacing: '0.04em' }}>Riservato esclusivamente a coppie di professionisti</span>
          </div>
          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', justifyContent: 'center' }}>
            <a href="#pricing" style={{ ...s.ctaBtn, fontSize: 15, padding: '14px 32px' }}

              onMouseLeave={e => e.target.style.opacity = '1'}
            >Scopri il servizio</a>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={{
              padding: '14px 32px', background: 'transparent',
              border: '1.5px solid oklch(50% 0.05 155)',
              borderRadius: 4, fontSize: 15, color: 'oklch(85% 0.005 80)', cursor: 'pointer',
              textDecoration: 'none', fontFamily: 'DM Sans', transition: 'border-color 0.2s',
            }}
              onMouseEnter={e => { e.target.style.borderColor = accent; }}
              onMouseLeave={e => { e.target.style.borderColor = 'oklch(50% 0.05 155)'; }}
            >Contattami via WhatsApp</a>
          </div>
        </div>
      </section>

      {/* DIVIDER */}
      <div style={{ height: 1, background: isDark ? 'oklch(28% 0.01 80)' : 'oklch(88% 0.01 80)', margin: '0 5%' }}/>

      {/* COS'È */}
      <section style={{ ...s.section, background: bg }}>
        <div className="grid-2col" style={{ ...s.sectionInner, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'start' }}>
          <div className="reveal">
            <p style={s.sectionTag}>Il servizio</p>
            <h2 style={s.sectionTitle}>Cosa significa<br/>supervisionarsi tra pari</h2>
          </div>
          <div className="reveal" style={{ paddingTop: isMobile ? 0 : 12 }}>
            <p style={{ fontSize: 17, lineHeight: 1.85, color: textMuted, fontWeight: 300, marginBottom: 24, textWrap: 'pretty' }}>
              La supervisione tra pari è una pratica di sviluppo professionale in cui due colleghi portano la propria esperienza dentro uno spazio facilitato da un terzo esperto. Non è terapia, non è formazione frontale: è un luogo di riflessione condivisa su <strong style={{ color: text, fontWeight: 500 }}>come stai in relazione con le persone con cui lavori</strong>.
            </p>
            <p style={{ fontSize: 17, lineHeight: 1.85, color: textMuted, fontWeight: 300, marginBottom: 24, textWrap: 'pretty' }}>
              Il principio metodologico di questo percorso è che le <strong style={{ color: text, fontWeight: 500 }}>casistiche da mettere in scena sono selezionate dal supervisore</strong> in base alle esigenze dei partecipanti. Non si parte da ciò che si è già pronti a vedere: si lavora su scenari costruiti per far emergere i temi trasversali più rilevanti per quella coppia di professionisti.
            </p>
            <p style={{ fontSize: 17, lineHeight: 1.85, color: textMuted, fontWeight: 300, textWrap: 'pretty' }}>
              Il formato <strong style={{ color: text, fontWeight: 500 }}>esclusivamente in coppia</strong> non è una limitazione operativa, ma una scelta metodologica precisa: il dialogo tra due professionisti genera una qualità di riflessione che la supervisione individuale da sola non produce.
            </p>
          </div>
        </div>
      </section>

      {/* PULL QUOTE - principio metodologico */}
      <section style={{ ...s.section, background: bgAlt, paddingTop: 60, paddingBottom: 60 }}>
        <div style={s.sectionInner}>
          <div className="reveal" style={{
            padding: '48px 56px',

            borderLeft: `3px solid ${accent}`,
            borderRadius: '0 4px 4px 0',

          }}>
            <p style={{
              fontFamily: 'Cormorant Garamond, serif',
              fontSize: isMobile ? 22 : 28, fontWeight: 300, fontStyle: 'italic',
              color: text, lineHeight: 1.6, marginBottom: 16,
            }}>
              "Mettere in scena casistiche selezionate dal supervisore in base alle esigenze dei partecipanti."
            </p>
            <p style={{ fontSize: 13, color: textMuted, letterSpacing: '0.08em', textTransform: 'uppercase' }}>— Il principio metodologico del percorso</p>
          </div>
        </div>

      {/* A CHI SI RIVOLGE */}

      {/* COME FUNZIONA */}

              <strong style={{ color: 'oklch(85% 0.005 80)', fontWeight: 500 }}>Durata di ogni sessione: 90 minuti</strong> · videocall online · orario serale · tutti e tre presenti — i due professionisti si alternano nell'incarnare i ruoli selezionati dal supervisore

                textDecoration: 'none', fontFamily: 'DM Sans', transition: 'border-color 0.2s, color 0.2s',

                onMouseEnter={e => { e.target.style.borderColor = accent; e.target.style.color = accent; }}

              background: isDark ? 'oklch(17% 0.04 145)' : 'oklch(26% 0.06 155)',

              display: 'flex', flexDirection: 'column',
              position: 'relative', overflow: 'hidden',

                position: 'absolute', top: 16, right: 16,

              <p style={{ fontSize: 11, letterSpacing: '0.16em', textTransform: 'uppercase', color: 'oklch(70% 0.06 145)', marginBottom: 12 }}>Pacchetto 5 sessioni</p>
              <p style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 32, fontWeight: 300, color: 'oklch(95% 0.005 80)', lineHeight: 1.2, marginBottom: 6 }}>Scontato del 20%</p>
              <p style={{ fontSize: 13, color: 'oklch(68% 0.01 80)', fontWeight: 300, marginBottom: 28 }}>rispetto alle 5 sessioni singole · contattami per il dettaglio</p>
              <p style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 19, fontWeight: 300, color: 'oklch(75% 0.01 80)', lineHeight: 1.5, marginBottom: 32 }}>
                Un percorso continuativo per lavorare in profondità sui pattern relazionali nel tempo.
              </p>
              <div style={{ borderTop: '1px solid oklch(50% 0.06 155)', paddingTop: 28, marginBottom: 32, display: 'flex', flexDirection: 'column', gap: 12 }}>
                {['Tutto incluso nella sessione singola','5 incontri con la stessa coppia','Sconto del 20% sul totale','Continuità e progressione sui temi'].map(f => (
                  <div key={f} style={{ display: 'flex', gap: 10, alignItems: 'flex-start' }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, marginTop: 2 }}><path d="M5 12l5 5L19 7" stroke={accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    <span style={{ fontSize: 14, color: 'oklch(75% 0.01 80)', fontWeight: 300, lineHeight: 1.5 }}>{f}</span>
                  </div>
                ))}
              </div>
              <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={{
                display: 'block', textAlign: 'center', padding: '14px 24px',
                background: accent, border: 'none',
                borderRadius: 4, fontSize: 14, color: '#fff', cursor: 'pointer',
                textDecoration: 'none', fontFamily: 'DM Sans', transition: 'opacity 0.2s, transform 0.15s',
                marginTop: 'auto', fontWeight: 500,
              }}
                onMouseEnter={e => { e.target.style.opacity = '0.85'; e.target.style.transform = 'translateY(-1px)'; }}

          </div>
          <div className="reveal" style={{ marginTop: 28, textAlign: 'center' }}>
            <p style={{ fontSize: 13, color: textMuted, fontWeight: 300, lineHeight: 1.7 }}>
              Per conoscere i dettagli economici del servizio, scrivimi direttamente su WhatsApp.
            </p>
          </div>
        </div>
      </section>

      {/* FAQ */}
      <section style={{ ...s.section, background: bg }}>
        <div style={{ ...s.sectionInner, maxWidth: 860 }}>
          <div className="reveal" style={{ marginBottom: 56 }}>
            <p style={s.sectionTag}>Domande frequenti</p>
            <h2 style={s.sectionTitle}>Hai ancora dubbi?</h2>
          </div>
          {faqs.map((faq, i) => {
            const [open, setOpen] = React.useState(false);
            return (
              <div key={i} className="reveal" style={{
                borderTop: `1px solid ${isDark ? 'oklch(28% 0.01 80)' : 'oklch(88% 0.01 80)'}`,
                ...(i === faqs.length - 1 ? { borderBottom: `1px solid ${isDark ? 'oklch(28% 0.01 80)' : 'oklch(88% 0.01 80)'}` } : {}),
              }}>
                <button
                  onClick={() => setOpen(o => !o)}
                  style={{
                    width: '100%', textAlign: 'left', padding: '24px 0',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    background: 'none', border: 'none', cursor: 'pointer', gap: 16,
                  }}
                >
                  <span style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 20, fontWeight: 400, color: text, lineHeight: 1.3 }}>{faq.q}</span>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, transition: 'transform 0.3s', transform: open ? 'rotate(45deg)' : 'none' }}>
                    <path d="M12 5v14M5 12h14" stroke={accent} strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                </button>
                {open && (
                  <p style={{ fontSize: 15, lineHeight: 1.8, color: textMuted, fontWeight: 300, paddingBottom: 24 }}>{faq.a}</p>
                )}
              </div>
            );
          })}
        </div>
      </section>

      {/* CTA FINALE */}
      <section style={{ ...s.section, background: bgDark, textAlign: 'center' }}>
        <div style={{ ...s.sectionInner, maxWidth: 680 }}>
          <div className="reveal">
            <p style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'oklch(70% 0.10 145)', fontWeight: 500, marginBottom: 24 }}>Inizia adesso</p>
            <h2 style={{
              fontFamily: 'Cormorant Garamond, serif',
              fontSize: 'clamp(32px, 4vw, 52px)',
              fontWeight: 300, lineHeight: 1.15,
              color: 'oklch(95% 0.005 80)',
              marginBottom: 24,
            }}>
              Hai già un collega con cui vorresti fare questo percorso?
            </h2>
            <p style={{ fontSize: 16, lineHeight: 1.8, color: 'oklch(68% 0.01 80)', fontWeight: 300, marginBottom: 40, maxWidth: 560, margin: '0 auto 40px' }}>
              Scrivimi su WhatsApp — ti rispondo entro 24 ore e fissiamo una call conoscitiva gratuita di 30 minuti per capire se è il percorso giusto per voi.
            </p>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={{ ...s.ctaBtn, fontSize: 15, padding: '16px 40px' }}
              onMouseEnter={e => { e.target.style.opacity = '0.85'; e.target.style.transform = 'translateY(-1px)'; }}
              onMouseLeave={e => { e.target.style.opacity = '1'; e.target.style.transform = 'none'; }}

          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{
        padding: '40px 5%',
        borderTop: `1px solid ${isDark ? 'oklch(28% 0.01 80)' : 'oklch(88% 0.01 80)'}`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        flexWrap: 'wrap', gap: 16,
        background: bg,
      }}>
        <div>
          <p style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 16, fontWeight: 500, color: text }}>Update Your Life</p>
          <p style={{ fontSize: 12, color: textMuted, fontWeight: 300, marginTop: 4 }}>Francesco Maragliulo — Psicologo · Coach · Counselor · Supervisore</p>
        </div>
        <p style={{ fontSize: 12, color: textMuted, fontWeight: 300 }}>© {new Date().getFullYear()} Francesco Maragliulo</p>
      </footer>

    </div>

}
